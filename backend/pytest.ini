[pytest]
addopts = -m "not integration"
# Phase A 회귀 테스트 스캐폴딩
# rootdir = backend (이 파일 위치 기준 자동 결정)
# 사용법: cd backend && pytest -v

testpaths = tests
pythonpath = .
asyncio_mode = auto

# 통합 테스트(실제 Ollama/S2 호출)는 -m integration 으로 옵트인
markers =
    integration: 실제 외부 서비스(Ollama/S2)를 호출하는 통합 테스트

# 경고를 깔끔하게
filterwarnings =
    ignore::DeprecationWarning
